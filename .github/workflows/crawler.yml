name: Job Crawler

on:
  schedule:
    # Läuft täglich um 6:30 Uhr UTC = 7:30 bzw. 8:30 Uhr deutscher Zeit
    # (je nach Sommer-/Winterzeit). Bei Bedarf einfach anpassen.
    - cron: "30 6 * * *"
  workflow_dispatch: {} # erlaubt manuelles Auslösen über die GitHub-Oberfläche

permissions:
  contents: read # kein "write" mehr nötig, da nichts mehr ins Repo zurückgeschrieben wird

# Verhindert, dass zwei Läufe gleichzeitig starten und sich gegenseitig
# beim Lesen/Schreiben der Job-ID-Liste in die Quere kommen.
concurrency:
  group: job-crawler-single-run
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      # Statt die Liste bekannter Job-IDs per "git push" ins Repository
      # zurückzuschreiben (was wiederholt zu Konflikten führte, wenn z.B.
      # gleichzeitig manuell gepusht oder mehrfach getestet wurde), nutzen
      # wir jetzt GitHub's eigenen Cache-Speicher dafür. Das ist komplett
      # unabhängig von Git-Commits/Pushes -- es kann dabei keinen
      # "rejected, fetch first"-Konflikt mehr geben.
      - name: Liste bekannter Job-IDs aus dem Cache laden
        uses: actions/cache/restore@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Crawler ausführen
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_API_KEY_MOEHRE: ${{ secrets.RESEND_API_KEY_MOEHRE }}
        run: python -m src.main

      - name: Aktualisierte Liste bekannter Job-IDs im Cache speichern
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
