name: Job Crawler

on:
  schedule:
    # Läuft täglich um 6:30 Uhr UTC = 7:30 bzw. 8:30 Uhr deutscher Zeit
    # (je nach Sommer-/Winterzeit). Bei Bedarf einfach anpassen.
    - cron: "30 6 * * *"
  workflow_dispatch: {} # erlaubt manuelles Auslösen über die GitHub-Oberfläche

permissions:
  contents: write # nötig, damit der Workflow data/seen_jobs.json zurückschreiben darf

# Verhindert, dass zwei Läufe gleichzeitig starten und sich beim finalen
# Push gegenseitig blockieren -- ein neuer Lauf wartet, bis der vorherige
# fertig ist, statt parallel zu laufen.
concurrency:
  group: job-crawler-single-run
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Crawler ausführen
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python -m src.main

      - name: Aktualisierte Duplikat-Liste committen
        run: |
          git config user.name "job-crawler-bot"
          git config user.email "actions@github.com"
          git add data/seen_jobs.json
          git diff --quiet --cached || git commit -m "Aktualisiere gesehene Job-IDs [skip ci]"
          # Bis zu 5 Versuche: zuerst Remote-Stand einarbeiten, dann pushen.
          # Falls zwischen Pull und Push doch noch jemand anderes gepusht hat,
          # einfach erneut versuchen statt sofort aufzugeben.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push; then
              echo "Push erfolgreich (Versuch $i)."
              break
            fi
            echo "Push fehlgeschlagen (Versuch $i von 5), erneuter Versuch ..."
            sleep $((RANDOM % 5 + 1))
          done